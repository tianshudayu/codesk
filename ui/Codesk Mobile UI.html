<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codesk — Mobile UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #050508; overflow: hidden; }
body {
  display: flex; align-items: center; justify-content: center;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(ellipse at 20% 50%, rgba(138,43,226,0.06) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(91,43,180,0.04) 0%, transparent 50%),
              #050508;
}
#root { display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">
// ─── Codesk Design Tokens ───────────────────────────────────
const C = {
  bg:        '#000000',
  bgSoft:    '#09090B',
  panel:     '#0F0F12',
  panel2:    '#141418',
  panel3:    '#1A1A20',
  line:      'rgba(255,255,255,0.07)',
  lineStrong:'rgba(255,255,255,0.14)',
  text:      '#FAFAFA',
  textSoft:  '#A1A1AA',
  muted:     '#71717A',
  accent:    '#8B5CF6',
  accentDim: 'rgba(139,92,246,0.18)',
  accentGlow:'rgba(139,92,246,0.08)',
  warn:      '#E9E2BF',
  danger:    '#F0B1AD',
  success:   '#86EFAC',
};

const MONO = "'JetBrains Mono', monospace";
const SANS = "'Inter', sans-serif";

// ─── Brand Icon ─────────────────────────────────────────────
const BrandIcon = ({ size = 28 }) => (
  <svg width={size} height={size} viewBox="0 0 256 256" fill="none">
    <path d="M72 112V86C72 71.64 83.64 60 98 60H122" stroke="#FFFFFF" strokeWidth="24" strokeLinecap="round" strokeLinejoin="round"/>
    <path d="M134 60H158C172.36 60 184 71.64 184 86V122" stroke="#8B5CF6" strokeWidth="24" strokeLinecap="round" strokeLinejoin="round"/>
    <path d="M184 134V158C184 172.36 172.36 184 158 184H134" stroke="#FFFFFF" strokeWidth="24" strokeLinecap="round" strokeLinejoin="round"/>
    <path d="M122 184H98C83.64 184 72 172.36 72 158V134" stroke="#8B5CF6" strokeWidth="24" strokeLinecap="round" strokeLinejoin="round"/>
    <path d="M108 108L88 128L108 148" stroke="#FFFFFF" strokeWidth="14" strokeLinecap="round" strokeLinejoin="round"/>
    <path d="M138 96L120 160" stroke="#FFFFFF" strokeWidth="14" strokeLinecap="round"/>
    <path d="M150 108L170 128L150 148" stroke="#FFFFFF" strokeWidth="14" strokeLinecap="round" strokeLinejoin="round"/>
    <rect x="146" y="144" width="8" height="18" rx="4" fill="#8B5CF6"/>
  </svg>
);

// ─── Pulse Dot ───────────────────────────────────────────────
const PulseDot = ({ color = C.success }) => (
  <span style={{ position: 'relative', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 8, height: 8 }}>
    <span style={{ position: 'absolute', width: '100%', height: '100%', borderRadius: '50%', background: color, opacity: 0.4, animation: 'pulse 2s infinite' }} />
    <span style={{ position: 'relative', width: 6, height: 6, borderRadius: '50%', background: color }} />
  </span>
);

// ─── Tag/Chip ────────────────────────────────────────────────
const Chip = ({ children, color, dim }) => (
  <span style={{
    display: 'inline-flex', alignItems: 'center', gap: 4,
    padding: '2px 8px', borderRadius: 6,
    border: `1px solid ${color || C.lineStrong}`,
    background: dim || C.accentDim,
    color: color || C.accent,
    fontSize: 10, fontWeight: 600, letterSpacing: '0.06em',
    fontFamily: SANS, textTransform: 'uppercase',
  }}>{children}</span>
);

// ─── Screen 1: Auth ──────────────────────────────────────────
const AuthScreen = ({ onPaired }) => {
  const [code, setCode] = React.useState('');
  const [status, setStatus] = React.useState('idle'); // idle | pairing | paired | error

  const handlePair = () => {
    if (code.length < 4) return;
    setStatus('pairing');
    setTimeout(() => {
      setStatus('paired');
      setTimeout(onPaired, 800);
    }, 1200);
  };

  return (
    <div style={{ height: '100%', background: C.bg, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 28px', gap: 0 }}>
      {/* background glow */}
      <div style={{ position: 'absolute', top: '20%', left: '50%', transform: 'translateX(-50%)', width: 200, height: 200, borderRadius: '50%', background: 'radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%)', pointerEvents: 'none' }} />

      {/* logo block */}
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, marginBottom: 52 }}>
        <div style={{ width: 64, height: 64, borderRadius: 18, background: C.panel2, border: `1px solid ${C.lineStrong}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <BrandIcon size={38} />
        </div>
        <div>
          <div style={{ fontFamily: SANS, fontSize: 22, fontWeight: 700, color: C.text, textAlign: 'center', letterSpacing: '-0.02em' }}>codesk</div>
          <div style={{ fontFamily: SANS, fontSize: 12, color: C.muted, textAlign: 'center', marginTop: 2, letterSpacing: '0.08em', textTransform: 'uppercase' }}>remote</div>
        </div>
      </div>

      {/* status lines */}
      <div style={{ width: '100%', marginBottom: 24, display: 'flex', flexDirection: 'column', gap: 8 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <PulseDot color={C.success} />
          <span style={{ fontFamily: MONO, fontSize: 11, color: C.textSoft }}>bridge online · localhost:8890</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <PulseDot color={C.accent} />
          <span style={{ fontFamily: MONO, fontSize: 11, color: C.textSoft }}>relay · seoul · connected</span>
        </div>
      </div>

      {/* pair input */}
      <div style={{ width: '100%', display: 'flex', gap: 8 }}>
        <input
          value={code}
          onChange={e => setCode(e.target.value.replace(/\D/g, '').slice(0, 6))}
          placeholder="配对码"
          inputMode="numeric"
          style={{
            flex: 1, background: C.panel2, border: `1px solid ${status === 'error' ? C.danger : C.lineStrong}`,
            borderRadius: 12, padding: '14px 16px', color: C.text,
            fontFamily: MONO, fontSize: 18, letterSpacing: '0.18em',
            outline: 'none', textAlign: 'center',
          }}
        />
        <button
          onClick={handlePair}
          style={{
            width: 52, borderRadius: 12,
            background: status === 'paired' ? '#22c55e' : C.accent,
            border: 'none', color: '#fff',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            transition: 'all 0.2s', cursor: 'pointer', flexShrink: 0,
          }}
        >
          {status === 'pairing' ? (
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style={{ animation: 'spin 1s linear infinite' }}>
              <path d="M10 2a8 8 0 100 16A8 8 0 0010 2z" stroke="rgba(255,255,255,0.3)" strokeWidth="2"/>
              <path d="M10 2a8 8 0 018 8" stroke="white" strokeWidth="2" strokeLinecap="round"/>
            </svg>
          ) : status === 'paired' ? (
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9l5 5 7-8" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          ) : (
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9h12M10 3l6 6-6 6" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          )}
        </button>
      </div>

      {status === 'paired' && (
        <div style={{ marginTop: 12, fontFamily: SANS, fontSize: 13, color: C.success, textAlign: 'center' }}>已配对 · 正在进入…</div>
      )}

      <div style={{ marginTop: 16, fontFamily: SANS, fontSize: 12, color: C.muted, textAlign: 'center', lineHeight: 1.6 }}>
        在电脑打开 <span style={{ fontFamily: MONO, color: C.textSoft }}>127.0.0.1:8890/api/admin/state</span><br/>查看 pairCode
      </div>
    </div>
  );
};

// ─── Screen 2: Library (Thread List) ────────────────────────
const LIVE_SESSIONS = [
  { id: 's1', title: '重构用户认证模块', workspace: 'backend-api', status: 'running', turns: 14, updated: '2分钟前', hasApproval: false },
  { id: 's2', title: '修复 WebSocket 断线重连', workspace: 'mcp-relay', status: 'needs-approval', turns: 7, updated: '刚刚', hasApproval: true },
];
const RECENT_THREADS = [
  { id: 't1', title: '添加 cloud_identity 鉴权逻辑', workspace: 'bridge', status: 'completed', turns: 23, updated: '1小时前' },
  { id: 't2', title: '优化 Android APK 打包流程', workspace: 'android_app', status: 'completed', turns: 11, updated: '今天 09:41' },
  { id: 't3', title: '设计 relay 心跳协议', workspace: 'mcp-relay', status: 'completed', turns: 8, updated: '昨天' },
  { id: 't4', title: '修复 PySide6 托盘图标闪烁', workspace: 'clients/windows', status: 'cancelled', turns: 3, updated: '昨天' },
];

const StatusBadge = ({ status }) => {
  const cfg = {
    running:         { label: '进行中', color: '#60A5FA', bg: 'rgba(96,165,250,0.1)' },
    'needs-approval':{ label: '待审批', color: C.warn,    bg: 'rgba(233,226,191,0.1)' },
    completed:       { label: '已完成', color: C.muted,   bg: 'transparent' },
    cancelled:       { label: '已取消', color: C.muted,   bg: 'transparent' },
  };
  const c = cfg[status] || cfg.completed;
  return (
    <span style={{ fontFamily: SANS, fontSize: 11, fontWeight: 500, color: c.color, background: c.bg, padding: '2px 7px', borderRadius: 6, border: `1px solid ${c.color}22` }}>
      {c.label}
    </span>
  );
};

const ThreadCard = ({ item, live, onPress }) => (
  <button
    onClick={onPress}
    style={{
      width: '100%', background: live ? C.panel2 : 'transparent',
      border: `1px solid ${live ? C.lineStrong : C.line}`,
      borderRadius: 14, padding: '13px 14px', textAlign: 'left', cursor: 'pointer',
      display: 'grid', gap: 6,
      position: 'relative', overflow: 'hidden',
    }}
  >
    {live && item.status === 'needs-approval' && (
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 2, background: `linear-gradient(90deg, ${C.warn}, transparent)` }} />
    )}
    {live && item.status === 'running' && (
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 2, background: `linear-gradient(90deg, ${C.accent}, transparent)` }} />
    )}
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
      <span style={{ fontFamily: SANS, fontSize: 13, fontWeight: 600, color: C.text, flex: 1, lineHeight: 1.3, textWrap: 'pretty' }}>{item.title}</span>
      <StatusBadge status={item.status} />
    </div>
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
      <span style={{ fontFamily: MONO, fontSize: 10, color: C.muted }}>{item.workspace}</span>
      <span style={{ width: 2, height: 2, borderRadius: '50%', background: C.muted }} />
      <span style={{ fontFamily: SANS, fontSize: 11, color: C.muted }}>{item.turns} turns</span>
      <span style={{ fontFamily: SANS, fontSize: 11, color: C.muted, marginLeft: 'auto' }}>{item.updated}</span>
    </div>
    {live && item.hasApproval && (
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 2 }}>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1L1 10h10L6 1z" stroke={C.warn} strokeWidth="1.4" strokeLinejoin="round"/><path d="M6 5v2.5M6 9v.5" stroke={C.warn} strokeWidth="1.4" strokeLinecap="round"/></svg>
        <span style={{ fontFamily: SANS, fontSize: 11, color: C.warn }}>需要审批</span>
      </div>
    )}
  </button>
);

const LibraryScreen = ({ onSelectSession, onNewTask }) => {
  const [tab, setTab] = React.useState('threads');

  return (
    <div style={{ height: '100%', background: C.bg, display: 'flex', flexDirection: 'column' }}>
      {/* header */}
      <div style={{ padding: '16px 16px 12px', borderBottom: `1px solid ${C.line}`, flexShrink: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <BrandIcon size={22} />
            <span style={{ fontFamily: SANS, fontSize: 17, fontWeight: 700, color: C.text, letterSpacing: '-0.01em' }}>codesk</span>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={onNewTask} style={{ height: 34, paddingInline: 14, borderRadius: 9, background: C.accent, border: 'none', color: '#fff', fontFamily: SANS, fontSize: 13, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5 }}>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>
              新建
            </button>
            <button style={{ width: 34, height: 34, borderRadius: 9, background: C.panel2, border: `1px solid ${C.line}`, color: C.muted, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke={C.muted} strokeWidth="1.5"/><path d="M11 11l3 3" stroke={C.muted} strokeWidth="1.5" strokeLinecap="round"/></svg>
            </button>
          </div>
        </div>

        {/* connection indicator */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 10 }}>
          <PulseDot color={C.success} />
          <span style={{ fontFamily: MONO, fontSize: 10, color: C.muted }}>bridge · 127.0.0.1:8890</span>
          <span style={{ marginLeft: 'auto', fontFamily: MONO, fontSize: 10, color: C.muted }}>relay · seoul</span>
          <PulseDot color={C.accent} />
        </div>
      </div>

      {/* content */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '14px 14px 80px', display: 'flex', flexDirection: 'column', gap: 20 }}>
        {/* live section */}
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
            <span style={{ fontFamily: SANS, fontSize: 10, fontWeight: 700, color: C.muted, letterSpacing: '0.1em', textTransform: 'uppercase' }}>运行中</span>
            <span style={{ fontFamily: SANS, fontSize: 11, color: C.accent, background: C.accentDim, padding: '1px 7px', borderRadius: 999, fontWeight: 600 }}>{LIVE_SESSIONS.length}</span>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {LIVE_SESSIONS.map(s => <ThreadCard key={s.id} item={s} live onPress={() => onSelectSession(s)} />)}
          </div>
        </div>

        {/* divider */}
        <div style={{ height: 1, background: C.line }} />

        {/* recent section */}
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
            <span style={{ fontFamily: SANS, fontSize: 10, fontWeight: 700, color: C.muted, letterSpacing: '0.1em', textTransform: 'uppercase' }}>最近</span>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {RECENT_THREADS.map(t => <ThreadCard key={t.id} item={t} live={false} onPress={() => {}} />)}
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── Screen 3: Session View ──────────────────────────────────
const MESSAGES = [
  { role: 'user', content: '帮我重构 WebSocket 断线重连逻辑，需要支持指数退避策略' },
  { role: 'tool', name: 'read_file', args: 'bridge/relay_client.py', status: 'completed' },
  { role: 'tool', name: 'read_file', args: 'mcp_relay/main.py', status: 'completed' },
  { role: 'assistant', content: '我已经读取了相关文件。当前的实现使用固定间隔重连，存在以下问题：\n\n1. 无退避策略，频繁重连会增加服务器压力\n2. 没有最大重试次数限制\n3. 连接恢复后不会同步未确认的消息\n\n我将重写 `relay_client.py` 中的重连逻辑：' },
  { role: 'tool', name: 'write_file', args: 'bridge/relay_client.py', status: 'running' },
];

const APPROVAL_ITEM = {
  kind: 'write_file',
  path: 'bridge/relay_client.py',
  preview: `async def _reconnect_loop(self):\n    delay = 1.0\n    max_delay = 60.0\n    while not self._closed:\n        await asyncio.sleep(delay)\n        try:\n            await self._connect()\n            delay = 1.0  # reset\n        except Exception:\n            delay = min(delay * 2, max_delay)`,
};

const MessageBubble = ({ msg }) => {
  if (msg.role === 'user') return (
    <div style={{ alignSelf: 'flex-end', maxWidth: '85%', background: C.panel3, border: `1px solid ${C.lineStrong}`, borderRadius: '16px 16px 4px 16px', padding: '10px 14px' }}>
      <div style={{ fontFamily: SANS, fontSize: 13, color: C.text, lineHeight: 1.55, whiteSpace: 'pre-wrap' }}>{msg.content}</div>
    </div>
  );

  if (msg.role === 'tool') return (
    <div style={{ alignSelf: 'flex-start', maxWidth: '90%', background: C.panel, border: `1px solid ${msg.status === 'running' ? C.accent + '44' : C.line}`, borderRadius: 12, padding: '8px 12px', display: 'flex', alignItems: 'center', gap: 8 }}>
      {msg.status === 'running' ? (
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ animation: 'spin 1s linear infinite', flexShrink: 0 }}>
          <path d="M7 1a6 6 0 100 12A6 6 0 007 1z" stroke={C.line} strokeWidth="1.5"/>
          <path d="M7 1a6 6 0 016 6" stroke={C.accent} strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
      ) : (
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ flexShrink: 0 }}><circle cx="7" cy="7" r="6" fill={C.accentDim}/><path d="M4 7l2 2 4-4" stroke={C.accent} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
      )}
      <span style={{ fontFamily: MONO, fontSize: 11, color: msg.status === 'running' ? C.accent : C.textSoft }}>
        {msg.name}
        <span style={{ color: C.muted }}> · {msg.args}</span>
      </span>
    </div>
  );

  if (msg.role === 'assistant') return (
    <div style={{ alignSelf: 'flex-start', maxWidth: '92%', display: 'flex', flexDirection: 'column', gap: 0 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6 }}>
        <div style={{ width: 18, height: 18, borderRadius: 5, background: C.accentDim, border: `1px solid ${C.accent}44`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <BrandIcon size={11} />
        </div>
        <span style={{ fontFamily: SANS, fontSize: 10, color: C.muted, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase' }}>Codex</span>
      </div>
      <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: '4px 16px 16px 16px', padding: '10px 14px' }}>
        <div style={{ fontFamily: SANS, fontSize: 13, color: C.textSoft, lineHeight: 1.65, whiteSpace: 'pre-wrap' }}>{msg.content}</div>
      </div>
    </div>
  );

  return null;
};

const ApprovalCard = ({ item, onApprove, onReject }) => (
  <div style={{ border: `1px solid ${C.warn}44`, borderRadius: 14, background: `rgba(233,226,191,0.04)`, overflow: 'hidden', marginTop: 4 }}>
    <div style={{ padding: '10px 14px 8px', borderBottom: `1px solid ${C.warn}22`, display: 'flex', alignItems: 'center', gap: 8 }}>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L1 12h12L7 1z" stroke={C.warn} strokeWidth="1.4" strokeLinejoin="round"/><path d="M7 5v3M7 10v.5" stroke={C.warn} strokeWidth="1.4" strokeLinecap="round"/></svg>
      <span style={{ fontFamily: SANS, fontSize: 11, fontWeight: 700, color: C.warn, letterSpacing: '0.08em', textTransform: 'uppercase' }}>需要审批</span>
      <Chip>{item.kind}</Chip>
    </div>
    <div style={{ padding: '10px 14px' }}>
      <div style={{ fontFamily: MONO, fontSize: 11, color: C.muted, marginBottom: 8 }}>{item.path}</div>
      <pre style={{ fontFamily: MONO, fontSize: 11, color: C.textSoft, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 8, padding: '10px 12px', overflow: 'auto', lineHeight: 1.6, margin: 0 }}>{item.preview}</pre>
    </div>
    <div style={{ padding: '8px 14px 12px', display: 'flex', gap: 8 }}>
      <button onClick={onApprove} style={{ flex: 1, height: 38, borderRadius: 10, background: C.accent, border: 'none', color: '#fff', fontFamily: SANS, fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>批准</button>
      <button style={{ flex: 1, height: 38, borderRadius: 10, background: 'transparent', border: `1px solid ${C.line}`, color: C.textSoft, fontFamily: SANS, fontSize: 13, fontWeight: 500, cursor: 'pointer' }}>本会话批准</button>
      <button onClick={onReject} style={{ height: 38, paddingInline: 14, borderRadius: 10, background: 'transparent', border: `1px solid ${C.danger}44`, color: C.danger, fontFamily: SANS, fontSize: 13, fontWeight: 500, cursor: 'pointer' }}>拒绝</button>
    </div>
  </div>
);

const SessionScreen = ({ session, onBack, onApprove }) => {
  const [input, setInput] = React.useState('');
  const [approved, setApproved] = React.useState(false);
  const logRef = React.useRef(null);

  React.useEffect(() => {
    if (logRef.current) {
      logRef.current.scrollTop = logRef.current.scrollHeight;
    }
  }, [approved]);

  return (
    <div style={{ height: '100%', background: C.bg, display: 'flex', flexDirection: 'column' }}>
      {/* topbar */}
      <div style={{ padding: '10px 14px', borderBottom: `1px solid ${C.line}`, display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0, background: 'rgba(0,0,0,0.5)', backdropFilter: 'blur(8px)' }}>
        <button onClick={onBack} style={{ width: 32, height: 32, borderRadius: 8, background: C.panel2, border: `1px solid ${C.line}`, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
          <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M6 2L2 7l4 5" stroke={C.muted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontFamily: SANS, fontSize: 13, fontWeight: 600, color: C.text, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{session.title}</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 1 }}>
            <PulseDot color={session.status === 'needs-approval' && !approved ? C.warn : C.accent} />
            <span style={{ fontFamily: MONO, fontSize: 10, color: C.muted }}>{session.workspace}</span>
          </div>
        </div>
        <StatusBadge status={approved ? 'running' : session.status} />
        <button style={{ width: 32, height: 32, borderRadius: 8, background: 'transparent', border: `1px solid ${C.line}`, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
          <svg width="16" height="4" viewBox="0 0 16 4" fill="none"><circle cx="2" cy="2" r="1.5" fill={C.muted}/><circle cx="8" cy="2" r="1.5" fill={C.muted}/><circle cx="14" cy="2" r="1.5" fill={C.muted}/></svg>
        </button>
      </div>

      {/* activity bar */}
      <div style={{ padding: '6px 14px', borderBottom: `1px solid ${C.line}`, display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
          {!approved && <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{ animation: 'spin 1s linear infinite' }}><path d="M6 1a5 5 0 100 10A5 5 0 006 1z" stroke={C.line} strokeWidth="1.5"/><path d="M6 1a5 5 0 015 5" stroke={C.accent} strokeWidth="1.5" strokeLinecap="round"/></svg>}
          {approved && <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" fill={C.accentDim}/><path d="M3 6l2 2 4-4" stroke={C.accent} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          <span style={{ fontFamily: MONO, fontSize: 10, color: C.accent }}>{approved ? 'write_file · completed' : 'write_file · running'}</span>
        </div>
        <span style={{ marginLeft: 'auto', fontFamily: SANS, fontSize: 10, color: C.muted }}>turn {session.turns}</span>
      </div>

      {/* conversation */}
      <div ref={logRef} style={{ flex: 1, overflowY: 'auto', padding: '16px 14px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {MESSAGES.map((msg, i) => <MessageBubble key={i} msg={msg} />)}
        {!approved && <ApprovalCard item={APPROVAL_ITEM} onApprove={() => { setApproved(true); onApprove && onApprove(); }} onReject={() => {}} />}
        {approved && (
          <div style={{ alignSelf: 'center', fontFamily: SANS, fontSize: 12, color: C.success, background: 'rgba(134,239,172,0.06)', border: '1px solid rgba(134,239,172,0.2)', borderRadius: 8, padding: '6px 14px' }}>
            ✓ 已批准 · 继续执行中
          </div>
        )}
        <div style={{ height: 8 }} />
      </div>

      {/* composer */}
      <div style={{ flexShrink: 0, padding: '10px 14px 24px', background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(12px)', borderTop: `1px solid ${C.line}` }}>
        <div style={{ display: 'flex', gap: 8, alignItems: 'flex-end' }}>
          <button style={{ width: 36, height: 36, borderRadius: 9, background: C.panel2, border: `1px solid ${C.line}`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, cursor: 'pointer' }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke={C.muted} strokeWidth="1.6" strokeLinecap="round"/></svg>
          </button>
          <div style={{ flex: 1, background: C.panel2, border: `1px solid ${C.lineStrong}`, borderRadius: 12, padding: '9px 12px', minHeight: 36 }}>
            <div style={{ fontFamily: SANS, fontSize: 13, color: C.muted }}>继续输入…</div>
          </div>
          <button style={{ width: 36, height: 36, borderRadius: 9, background: C.accent, border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, cursor: 'pointer' }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 12L12 7 2 2v4l7 1-7 1v4z" fill="white"/></svg>
          </button>
        </div>
      </div>
    </div>
  );
};

// ─── Screen 4: Compose New Task ──────────────────────────────
const ComposeScreen = ({ onBack, onCreate }) => {
  const [title, setTitle] = React.useState('');
  const [prompt, setPrompt] = React.useState('');
  const [workspace, setWorkspace] = React.useState('bridge');
  const [creating, setCreating] = React.useState(false);

  const handleCreate = () => {
    if (!prompt.trim()) return;
    setCreating(true);
    setTimeout(() => onCreate(), 1200);
  };

  return (
    <div style={{ height: '100%', background: C.bg, display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '12px 14px', borderBottom: `1px solid ${C.line}`, display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
        <button onClick={onBack} style={{ width: 32, height: 32, borderRadius: 8, background: C.panel2, border: `1px solid ${C.line}`, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
          <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M6 2L2 7l4 5" stroke={C.muted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <span style={{ fontFamily: SANS, fontSize: 15, fontWeight: 700, color: C.text }}>新建任务</span>
        <button onClick={handleCreate} disabled={!prompt.trim() || creating} style={{ marginLeft: 'auto', height: 34, paddingInline: 16, borderRadius: 9, background: prompt.trim() ? C.accent : C.panel2, border: 'none', color: prompt.trim() ? '#fff' : C.muted, fontFamily: SANS, fontSize: 13, fontWeight: 600, cursor: prompt.trim() ? 'pointer' : 'default', transition: 'all 0.2s', display: 'flex', alignItems: 'center', gap: 6 }}>
          {creating ? (
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ animation: 'spin 1s linear infinite' }}><path d="M7 1a6 6 0 100 12A6 6 0 007 1z" stroke="rgba(255,255,255,0.3)" strokeWidth="1.5"/><path d="M7 1a6 6 0 016 6" stroke="white" strokeWidth="1.5" strokeLinecap="round"/></svg>
          ) : null}
          {creating ? '创建中' : '开始'}
        </button>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '20px 16px 40px', display: 'flex', flexDirection: 'column', gap: 16 }}>
        {/* workspace select */}
        <div>
          <div style={{ fontFamily: SANS, fontSize: 10, color: C.muted, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8, fontWeight: 600 }}>工作区</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {['bridge', 'mcp-relay', 'android_app', 'clients/windows'].map(w => (
              <button key={w} onClick={() => setWorkspace(w)} style={{ height: 32, paddingInline: 12, borderRadius: 8, background: workspace === w ? C.accentDim : 'transparent', border: `1px solid ${workspace === w ? C.accent : C.line}`, color: workspace === w ? C.accent : C.textSoft, fontFamily: MONO, fontSize: 11, cursor: 'pointer', transition: 'all 0.15s' }}>{w}</button>
            ))}
          </div>
        </div>

        {/* title */}
        <div>
          <div style={{ fontFamily: SANS, fontSize: 10, color: C.muted, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8, fontWeight: 600 }}>标题（可选）</div>
          <input
            value={title}
            onChange={e => setTitle(e.target.value)}
            placeholder="简短描述任务…"
            style={{ width: '100%', background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 12, padding: '12px 14px', color: C.text, fontFamily: SANS, fontSize: 14, outline: 'none' }}
          />
        </div>

        {/* prompt */}
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: SANS, fontSize: 10, color: C.muted, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8, fontWeight: 600 }}>任务描述</div>
          <textarea
            value={prompt}
            onChange={e => setPrompt(e.target.value)}
            placeholder="详细描述你希望完成的任务…&#10;&#10;例如：重构 relay_client.py 中的重连逻辑，使用指数退避策略，最大延迟 60 秒，最多重试 10 次。"
            style={{ width: '100%', minHeight: 200, background: C.panel2, border: `1px solid ${prompt ? C.lineStrong : C.line}`, borderRadius: 12, padding: '12px 14px', color: C.text, fontFamily: SANS, fontSize: 13, outline: 'none', resize: 'none', lineHeight: 1.7 }}
          />
        </div>

        {/* quick prompts */}
        <div>
          <div style={{ fontFamily: SANS, fontSize: 10, color: C.muted, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8, fontWeight: 600 }}>快速模板</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {[
              '修复 bug：描述复现步骤和期望行为',
              '添加功能：描述需求和边界条件',
              '重构代码：指定目标文件和改进方向',
            ].map((t, i) => (
              <button key={i} onClick={() => setPrompt(t)} style={{ textAlign: 'left', padding: '10px 12px', borderRadius: 10, background: 'transparent', border: `1px solid ${C.line}`, color: C.muted, fontFamily: SANS, fontSize: 12, cursor: 'pointer', lineHeight: 1.4 }}>{t}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── Main App ────────────────────────────────────────────────
const SCREENS = ['auth', 'library', 'session', 'compose'];

function App() {
  const saved = localStorage.getItem('codesk_proto_screen');
  const [screen, setScreen] = React.useState(saved || 'auth');
  const [selectedSession, setSelectedSession] = React.useState(null);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [accentColor, setAccentColor] = React.useState('#8B5CF6');

  React.useEffect(() => {
    localStorage.setItem('codesk_proto_screen', screen);
  }, [screen]);

  // Tweaks setup
  React.useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const goToScreen = (s) => setScreen(s);

  const renderScreen = () => {
    switch (screen) {
      case 'auth':
        return <AuthScreen onPaired={() => goToScreen('library')} />;
      case 'library':
        return <LibraryScreen
          onSelectSession={(s) => { setSelectedSession(s); goToScreen('session'); }}
          onNewTask={() => goToScreen('compose')}
        />;
      case 'session':
        return <SessionScreen session={selectedSession || LIVE_SESSIONS[1]} onBack={() => goToScreen('library')} />;
      case 'compose':
        return <ComposeScreen onBack={() => goToScreen('library')} onCreate={() => goToScreen('library')} />;
      default:
        return null;
    }
  };

  // Scale device to fit viewport
  const W = 390, H = 844;
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const update = () => {
      const vw = window.innerWidth, vh = window.innerHeight;
      const s = Math.min((vw - 48) / W, (vh - 80) / H, 1.1);
      setScale(s);
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  return (
    <div style={{ position: 'relative', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 24 }}>
      {/* screen nav tabs */}
      <div style={{ display: 'flex', gap: 6, background: 'rgba(255,255,255,0.04)', padding: '4px', borderRadius: 12, border: '1px solid rgba(255,255,255,0.07)' }}>
        {[
          { id: 'auth', label: '配对' },
          { id: 'library', label: '线程库' },
          { id: 'session', label: '会话' },
          { id: 'compose', label: '新建' },
        ].map(tab => (
          <button key={tab.id} onClick={() => goToScreen(tab.id)} style={{
            padding: '6px 14px', borderRadius: 9, border: 'none', cursor: 'pointer',
            background: screen === tab.id ? 'rgba(255,255,255,0.08)' : 'transparent',
            color: screen === tab.id ? '#fff' : 'rgba(255,255,255,0.35)',
            fontFamily: "'Inter', sans-serif", fontSize: 12, fontWeight: screen === tab.id ? 600 : 400,
            transition: 'all 0.15s',
          }}>{tab.label}</button>
        ))}
      </div>

      {/* device */}
      <div style={{ transform: `scale(${scale})`, transformOrigin: 'top center' }}>
        <IOSDevice width={W} height={H} dark={true}>
          {renderScreen()}
        </IOSDevice>
      </div>

      {/* tweaks panel */}
      {tweaksOpen && (
        <div style={{ position: 'fixed', bottom: 20, right: 20, background: '#111', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 14, padding: 16, width: 220, zIndex: 9999, fontFamily: "'Inter', sans-serif" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,0.5)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 12 }}>Tweaks</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <div>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', marginBottom: 6 }}>强调色</div>
              <div style={{ display: 'flex', gap: 8 }}>
                {['#8B5CF6','#3B82F6','#10B981','#F59E0B','#EF4444'].map(c => (
                  <button key={c} onClick={() => setAccentColor(c)} style={{ width: 24, height: 24, borderRadius: 6, background: c, border: accentColor === c ? '2px solid white' : '2px solid transparent', cursor: 'pointer' }} />
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', marginBottom: 6 }}>屏幕</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                {[['auth','配对'],['library','线程库'],['session','会话'],['compose','新建']].map(([id,l]) => (
                  <button key={id} onClick={() => { goToScreen(id); }} style={{ textAlign: 'left', padding: '6px 10px', borderRadius: 7, background: screen === id ? 'rgba(255,255,255,0.08)' : 'transparent', border: 'none', color: screen === id ? 'white' : 'rgba(255,255,255,0.4)', fontSize: 12, cursor: 'pointer' }}>{l}</button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// CSS animations
const styleEl = document.createElement('style');
styleEl.textContent = `
  @keyframes pulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:0.8;transform:scale(1.6)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  * { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  input, textarea, select { outline: none; }
  button { font-family: 'Inter', sans-serif; }
`;
document.head.appendChild(styleEl);

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accentColor":"#8B5CF6","startScreen":"auth"}/*EDITMODE-END*/;

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
