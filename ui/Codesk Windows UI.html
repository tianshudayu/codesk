<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codesk — Windows UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI Variable', 'Segoe UI', 'Inter', system-ui, sans-serif; color-scheme: dark; }
body {
  display: flex; align-items: center; justify-content: center;
  /* Windows 11 desktop-ish backdrop */
  background:
    radial-gradient(ellipse at 15% 20%, rgba(139,92,246,0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 80%, rgba(59,130,246,0.06) 0%, transparent 50%),
    linear-gradient(135deg, #1a1624 0%, #0a0a10 60%, #050508 100%);
}
#root { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
@keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.8); opacity: 0; } }
@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 5px; border: 2px solid transparent; background-clip: content-box; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); background-clip: content-box; border: 2px solid transparent; }
input, textarea, select, button { outline: none; font-family: inherit; }
kbd { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ─── Design Tokens (shared with mobile) ──────────────────────
window.C = {
  bg:        '#0A0A0E',
  bgSoft:    '#09090B',
  panel:     '#111116',
  panel2:    '#16161C',
  panel3:    '#1C1C24',
  line:      'rgba(255,255,255,0.06)',
  lineStrong:'rgba(255,255,255,0.12)',
  text:      '#FAFAFA',
  textSoft:  '#A1A1AA',
  muted:     '#71717A',
  accent:    '#8B5CF6',
  accentDim: 'rgba(139,92,246,0.18)',
  accentGlow:'rgba(139,92,246,0.08)',
  warn:      '#E9E2BF',
  danger:    '#F0B1AD',
  success:   '#86EFAC',
};
window.MONO = "'JetBrains Mono', monospace";
window.SANS = "'Segoe UI Variable', 'Segoe UI', 'Inter', system-ui, sans-serif";

window.BrandIcon = ({ size = 28, accent = '#8B5CF6' }) => (
  <svg width={size} height={size} viewBox="0 0 256 256" fill="none">
    <path d="M72 112V86C72 71.64 83.64 60 98 60H122" stroke="#FFFFFF" strokeWidth="24" strokeLinecap="round" strokeLinejoin="round"/>
    <path d="M134 60H158C172.36 60 184 71.64 184 86V122" stroke={accent} strokeWidth="24" strokeLinecap="round" strokeLinejoin="round"/>
    <path d="M184 134V158C184 172.36 172.36 184 158 184H134" stroke="#FFFFFF" strokeWidth="24" strokeLinecap="round" strokeLinejoin="round"/>
    <path d="M122 184H98C83.64 184 72 172.36 72 158V134" stroke={accent} strokeWidth="24" strokeLinecap="round" strokeLinejoin="round"/>
    <path d="M108 108L88 128L108 148" stroke="#FFFFFF" strokeWidth="14" strokeLinecap="round" strokeLinejoin="round"/>
    <path d="M138 96L120 160" stroke="#FFFFFF" strokeWidth="14" strokeLinecap="round"/>
    <path d="M150 108L170 128L150 148" stroke="#FFFFFF" strokeWidth="14" strokeLinecap="round" strokeLinejoin="round"/>
    <rect x="146" y="144" width="8" height="18" rx="4" fill={accent}/>
  </svg>
);

window.PulseDot = ({ color }) => (
  <span style={{ position: 'relative', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 8, height: 8 }}>
    <span style={{ position: 'absolute', width: '100%', height: '100%', borderRadius: '50%', background: color, opacity: 0.4, animation: 'pulse 2s infinite' }}/>
    <span style={{ position: 'relative', width: 6, height: 6, borderRadius: '50%', background: color }}/>
  </span>
);
</script>

<script type="text/babel" src="windows-frame.jsx"></script>
<script type="text/babel" src="codesk-win-screens.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accentColor":"#8B5CF6","startScreen":"library","showTray":true}/*EDITMODE-END*/;

function App() {
  const saved = localStorage.getItem('codesk_win_screen');
  const [screen, setScreen] = React.useState(saved || TWEAK_DEFAULTS.startScreen);
  const [session, setSession] = React.useState(null);
  const [accent, setAccent] = React.useState(TWEAK_DEFAULTS.accentColor);
  const [showTray, setShowTray] = React.useState(TWEAK_DEFAULTS.showTray);
  const [tweakOpen, setTweakOpen] = React.useState(false);

  React.useEffect(() => { localStorage.setItem('codesk_win_screen', screen); }, [screen]);
  React.useEffect(() => { window.C.accent = accent; window.C.accentDim = accent + '2E'; }, [accent]);

  // tweaks protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (edits) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  };

  const openSession = (s) => { setSession(s); setScreen('session'); };

  const renderMain = () => {
    switch (screen) {
      case 'pair': return <PairScreen accent={accent}/>;
      case 'compose': return <ComposeScreen accent={accent} onCancel={() => setScreen('library')} />;
      case 'session': return <SessionScreen accent={accent} session={session} onBack={() => setScreen('library')}/>;
      case 'workspaces': return <WorkspacesPlaceholder accent={accent}/>;
      case 'settings': return <SettingsPlaceholder accent={accent}/>;
      default: return <LibraryScreen accent={accent} onOpen={openSession} onNew={() => setScreen('compose')}/>;
    }
  };

  const subtitles = {
    library: '会话库', session: session?.title || '会话', compose: '新建任务',
    pair: '配对手机', workspaces: '工作区', settings: '设置',
  };

  return (
    <div data-screen-label={'Windows · ' + screen} style={{ display: 'flex', gap: 28, alignItems: 'center' }}>
      <WinWindow title="Codesk" subtitle={subtitles[screen]} accent={accent}>
        <Sidebar active={screen} setActive={setScreen} accent={accent}/>
        {renderMain()}
      </WinWindow>

      {showTray && (
        <div data-screen-label="Windows · Tray Flyout" style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 10 }}>
          <WinTrayFlyout accent={accent}>
            <TrayFlyout accent={accent}/>
          </WinTrayFlyout>
          {/* fake taskbar stub */}
          <div style={{ width: 360, height: 44, background: 'rgba(12,12,18,0.75)', backdropFilter: 'blur(20px)', border: '1px solid rgba(255,255,255,0.06)', borderRadius: 8, display: 'flex', alignItems: 'center', paddingInline: 12, gap: 12 }}>
            <div style={{ flex: 1 }}/>
            {['', '', ''].map((_, i) => (
              <div key={i} style={{ width: 22, height: 22, borderRadius: 4, background: 'rgba(255,255,255,0.04)' }}/>
            ))}
            <div style={{ width: 22, height: 22, borderRadius: 4, background: 'rgba(139,92,246,0.15)', border: `1px solid ${accent}55`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <BrandIcon size={13} accent={accent}/>
            </div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10.5, color: 'rgba(255,255,255,0.55)', lineHeight: 1.1, textAlign: 'right', paddingLeft: 4 }}>
              14:28<br/><span style={{ opacity: 0.6 }}>周三</span>
            </div>
          </div>
        </div>
      )}

      {tweakOpen && (
        <div style={{ position: 'fixed', bottom: 24, right: 24, width: 240, background: '#0E0E14', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 10, padding: 14, zIndex: 999, boxShadow: '0 20px 60px rgba(0,0,0,0.6)' }}>
          <div style={{ fontSize: 10.5, fontWeight: 700, color: 'rgba(255,255,255,0.5)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 12 }}>Tweaks</div>

          <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginBottom: 6 }}>强调色</div>
          <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
            {['#8B5CF6','#3B82F6','#10B981','#F59E0B','#EF4444','#EC4899'].map(c => (
              <button key={c} onClick={() => { setAccent(c); setTweak({ accentColor: c }); }}
                style={{ width: 22, height: 22, borderRadius: 5, background: c, border: accent === c ? '2px solid white' : '1px solid rgba(255,255,255,0.1)', cursor: 'pointer', padding: 0 }}/>
            ))}
          </div>

          <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginBottom: 6 }}>屏幕</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 3, marginBottom: 14 }}>
            {[['library','会话库'],['session','会话'],['compose','新建任务'],['pair','配对'],['workspaces','工作区'],['settings','设置']].map(([id, l]) => (
              <button key={id} onClick={() => setScreen(id)} style={{
                textAlign: 'left', padding: '5px 9px', borderRadius: 5,
                background: screen === id ? 'rgba(139,92,246,0.18)' : 'transparent',
                border: 'none', color: screen === id ? '#fff' : 'rgba(255,255,255,0.6)',
                fontSize: 11.5, cursor: 'pointer',
              }}>{l}</button>
            ))}
          </div>

          <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 11.5, color: 'rgba(255,255,255,0.7)', cursor: 'pointer' }}>
            <input type="checkbox" checked={showTray} onChange={e => { setShowTray(e.target.checked); setTweak({ showTray: e.target.checked }); }}/>
            显示托盘浮窗
          </label>
        </div>
      )}
    </div>
  );
}

function WorkspacesPlaceholder({ accent }) {
  const rows = [
    { path: '~/code/codesk/bridge', branch: 'main', last: '2 分钟前', status: 'clean', sessions: 3 },
    { path: '~/code/codesk/mcp-relay', branch: 'fix/heartbeat', last: '12 分钟前', status: 'dirty', sessions: 1, dirty: 3 },
    { path: '~/code/codesk/android_app', branch: 'ui/bubble', last: '今天 10:32', status: 'dirty', sessions: 0, dirty: 1 },
    { path: '~/code/codesk/clients/windows', branch: 'ui/acrylic', last: '昨天', status: 'clean', sessions: 0 },
  ];
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '20px 28px 14px', display: 'flex', alignItems: 'flex-end', gap: 16, borderBottom: `1px solid ${C.line}` }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, color: C.muted, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 4 }}>工作区</div>
          <div style={{ fontSize: 22, fontWeight: 600, color: C.text, letterSpacing: '-0.01em' }}>仓库与分支</div>
        </div>
        <button style={{ height: 32, paddingInline: 14, background: accent, border: 'none', borderRadius: 6, color: '#fff', fontSize: 12.5, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6 }}>
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="white" strokeWidth="1.6" strokeLinecap="round"/></svg>
          添加工作区
        </button>
      </div>
      <div style={{ flex: 1, overflow: 'auto', padding: '14px 20px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '24px 1.5fr 1fr 0.7fr 0.6fr 0.6fr', fontSize: 10.5, color: C.muted, letterSpacing: '0.1em', textTransform: 'uppercase', padding: '6px 8px', borderBottom: `1px solid ${C.line}` }}>
          <div/><div>路径</div><div>分支</div><div>状态</div><div>线程</div><div>最近活动</div>
        </div>
        {rows.map((r, i) => (
          <div key={i} style={{ display: 'grid', gridTemplateColumns: '24px 1.5fr 1fr 0.7fr 0.6fr 0.6fr', padding: '12px 8px', borderBottom: `1px solid ${C.line}`, alignItems: 'center', fontSize: 12.5 }}>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 3l2-2h3l1 1h4v7H1V3z" stroke={C.textSoft} strokeWidth="1.2"/></svg>
            <span style={{ fontFamily: MONO, color: C.text }}>{r.path}</span>
            <span style={{ fontFamily: MONO, color: C.textSoft }}>{r.branch}</span>
            <span style={{ color: r.status === 'clean' ? C.success : C.warn, fontFamily: MONO, fontSize: 11.5 }}>
              {r.status === 'clean' ? '● clean' : `● ${r.dirty} dirty`}
            </span>
            <span style={{ fontFamily: MONO, color: C.textSoft }}>{r.sessions}</span>
            <span style={{ color: C.muted, fontSize: 11.5 }}>{r.last}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function SettingsPlaceholder({ accent }) {
  const Row = ({ label, detail, value, toggle }) => (
    <div style={{ padding: '14px 20px', borderBottom: `1px solid ${C.line}`, display: 'flex', alignItems: 'center', gap: 16 }}>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 13, color: C.text, fontWeight: 500 }}>{label}</div>
        {detail && <div style={{ fontSize: 11.5, color: C.muted, marginTop: 2 }}>{detail}</div>}
      </div>
      {value && <span style={{ fontFamily: MONO, fontSize: 12, color: C.textSoft }}>{value}</span>}
      {toggle && (
        <div style={{ width: 32, height: 18, borderRadius: 9, background: toggle === true ? accent : 'rgba(255,255,255,0.1)', position: 'relative', cursor: 'pointer' }}>
          <div style={{ position: 'absolute', top: 2, left: toggle === true ? 16 : 2, width: 14, height: 14, borderRadius: '50%', background: '#fff', transition: 'left 0.15s' }}/>
        </div>
      )}
    </div>
  );
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '20px 28px 14px', borderBottom: `1px solid ${C.line}` }}>
        <div style={{ fontSize: 11, color: C.muted, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 4 }}>设置</div>
        <div style={{ fontSize: 22, fontWeight: 600, color: C.text, letterSpacing: '-0.01em' }}>Codesk 偏好</div>
      </div>
      <div style={{ flex: 1, overflow: 'auto', padding: '6px 8px' }}>
        <div style={{ padding: '14px 20px 6px', fontSize: 10.5, color: C.muted, letterSpacing: '0.1em', textTransform: 'uppercase' }}>通用</div>
        <Row label="开机启动" detail="登录 Windows 后自动运行 Codesk 托盘" toggle={true}/>
        <Row label="窗口关闭行为" detail="关闭按钮最小化到托盘，Codesk 继续运行" value="最小化到托盘"/>
        <Row label="全局快捷键" detail="打开主窗口" value="Ctrl + Shift + K"/>

        <div style={{ padding: '18px 20px 6px', fontSize: 10.5, color: C.muted, letterSpacing: '0.1em', textTransform: 'uppercase' }}>Codex 运行时</div>
        <Row label="Codex CLI" detail="已安装 · v0.9.1" value="/usr/local/bin/codex"/>
        <Row label="Codex Desktop" detail="保持前台接收手机任务" toggle={true}/>
        <Row label="默认批准策略" detail="apply_patch · shell 命令 · 网络访问" value="敏感操作需确认"/>

        <div style={{ padding: '18px 20px 6px', fontSize: 10.5, color: C.muted, letterSpacing: '0.1em', textTransform: 'uppercase' }}>Bridge & Relay</div>
        <Row label="本机 Bridge" detail="127.0.0.1:7788 · 自动选端口" value="已运行"/>
        <Row label="Relay 节点" detail="根据延迟自动选择" value="hk1 · 12 ms"/>
        <Row label="遥测" detail="匿名错误上报帮助改进 Codesk" toggle={false}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
