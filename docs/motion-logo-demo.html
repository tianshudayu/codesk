<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Motion Logo Demo</title>
    <style>
        body {
            background-color: #050505; /* 极深的背景色，体现暗黑模式 */
            color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* 界面网格装饰 */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(#111 1px, transparent 1px),
                linear-gradient(90deg, #111 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            opacity: 0.5;
        }

        .logo-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            cursor: pointer;
        }

        /* 核心图形容器 */
        .core-mark {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            /* 象征极简 */
            border: 2px solid #27272a;
            background: #09090b;
            transition: all 0.5s ease;
        }

        /* Hover 时的光效呼吸 */
        .logo-container:hover .core-mark {
            border-color: rgba(138, 43, 226, 0.5); /* 紫色隐现 */
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.2), inset 0 0 15px rgba(138, 43, 226, 0.1);
        }

        /* 内部核心动态元素 (形似 < > 及里面的微火花) */
        .bracket {
            position: absolute;
            font-size: 48px;
            font-weight: 200;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Fira Code', monospace;
        }
        
        .bracket.left { left: 25px; }
        .bracket.right { right: 25px; }

        .spark {
            width: 12px;
            height: 12px;
            background-color: #8A2BE2; /* 核心紫色 */
            border-radius: 50%;
            /* 紫色呼吸动画 */
            animation: pulse-spark 2s infinite ease-in-out;
            box-shadow: 0 0 10px #8A2BE2;
        }

        /* Hover 交互：括号张开，火花增强 */
        .logo-container:hover .bracket.left { transform: translateX(-8px); color: rgba(255,255,255,1); }
        .logo-container:hover .bracket.right { transform: translateX(8px); color: rgba(255,255,255,1); }
        
        .logo-container:hover .spark {
            background-color: #9D4EDD; /* 变色更亮 */
            border-radius: 2px; /* 形状形变为方块，象征计算或像素点 */
            transform: scale(1.5) rotate(45deg);
            box-shadow: 0 0 20px #9D4EDD, 0 0 40px #9D4EDD;
            animation: none; /* 变为常亮高光 */
            transition: all 0.4s ease;
        }

        .brand-text {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 4px;
            color: #fafafa;
            /* 次级呼吸 */
            transition: color 0.3s ease;
        }

        .logo-container:hover .brand-text {
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* 火花待机呼吸动画 */
        @keyframes pulse-spark {
            0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 5px #8A2BE2; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 15px #8A2BE2; }
            100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 5px #8A2BE2; }
        }

        .hint {
            position: absolute;
            bottom: 40px;
            color: #A1A1AA;
            font-size: 14px;
            letter-spacing: 1px;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="logo-container" onclick="pulseAction()">
        <div class="core-mark" id="mark">
            <span class="bracket left">&lt;</span>
            <div class="spark" id="spark"></div>
            <span class="bracket right">&gt;</span>
        </div>
        <div class="brand-text">CODEX</div>
    </div>
    <div class="hint">Hover to active. Click to simulate AI output.</div>

    <script>
        function pulseAction() {
            const mark = document.getElementById('mark');
            const spark = document.getElementById('spark');

            // 模拟生成完成的一下剧烈震荡与变色
            mark.style.borderColor = '#8A2BE2';
            mark.style.boxShadow = '0 0 50px rgba(138, 43, 226, 0.6)';
            
            spark.style.transform = 'scale(2) rotate(90deg)';
            spark.style.backgroundColor = '#fff'; // 内核变白，外面紫光
            spark.style.boxShadow = '0 0 30px #8A2BE2, 0 0 60px #8A2BE2';

            setTimeout(() => {
                mark.style.borderColor = '';
                mark.style.boxShadow = '';
                spark.style.transform = '';
                spark.style.backgroundColor = '';
                spark.style.boxShadow = '';
            }, 600);
        }
    </script>
</body>
</html>
